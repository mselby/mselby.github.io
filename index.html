<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Selby | Interaction Designer & Researcher</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #111111;
            background-color: #ffffff;
            margin: 0;
            padding: 80px 10%; /* Matches the generous white space margins from the slide */
            line-height: 1.4;
        }

        .container {
            max-width: 800px;
        }

        h1.name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 80px;
        }

        h2.headline {
            font-size: 36px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin: 0 0 16px 0;
        }

        h3.sub-headline {
            font-size: 32px;
            font-weight: 400;
            color: #222222;
            margin: 0 0 60px 0;
        }

        .links-list {
            list-style-type: none;
            padding: 0;
            margin: 0 0 60px 0;
            font-size: 18px;
        }

        .links-list li {
            margin-bottom: 8px;
        }

        /* Recreates the bright green background block highlight from Slide2.jpeg */
        .links-list a {
            color: #000000;
            text-decoration: none;
            background-color: #00FF00; /* Crisp neon green highlight */
            padding: 2px 4px;
            font-weight: 500;
        }

        .links-list a:hover {
            opacity: 0.85;
        }

        .contact-section {
            font-size: 16px;
            color: #333333;
        }

        .contact-section h4 {
            font-size: 16px;
            font-weight: 400;
            margin: 0 0 14px 0;
            color: #111111;
        }

        .contact-info {
            line-height: 1.6;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            body {
                padding: 40px 5%;
            }
            h2.headline { font-size: 28px; }
            h3.sub-headline { font-size: 24px; margin-bottom: 40px; }
            h1.name { margin-bottom: 50px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo / Name Header -->
        <h1 class="name">Mark Selby</h1>

        <!-- Main Copy Block -->
        <h2 class="headline">Interaction Designer &amp; Researcher</h2>
        <h3 class="sub-headline">Bridging data, physical things, spaces and people.</h3>

        <!-- Highlighted Navigation Links -->
        <ul class="links-list">
            <!-- This routes your PDF safely through the Google web viewer to fix Firefox downloads -->
            <li>- <a href="https://docs.google.com/viewer?url=https://mselby.github.io/portfolio.pdf&embedded=true" target="_blank">Portfolio</a></li>
            
            <!-- Replace the '#' symbols below with your live links when you are ready -->
            <li>- <a href="https://www.linkedin.com/in/markselby/" target="_blank">LinkedIn</a></li>
            <li>- <a href="https://scholar.google.com/citations?hl=en&user=bg5HLvcAAAAJ&view_op=list_works&gmla=AIqSsVtOFbj9-adKlSkDBQkDu-fH-lpEYoillFTm_lsAKeCy6urgyxaWjGX4zKLEmR_uherYrO4RluciuCsXv8a-" target="_blank">Publications</a></li>
        </ul>

        <!-- Footer Contact Block -->
        <div class="contact-section">
            <h3>Get in touch</h3>
            <div class="contact-info">
                markjselby@gmail.com<br>
                +31(0)659583047<br>
                Rotterdam, Netherlands
            </div>
        </div>
    </div>

</body>
</html>
