<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | M. Selby</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f7;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 80%;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #1d1d1f;
            font-size: 28px;
        }
        p {
            color: #86868b;
            margin: 0 0 30px 0;
            font-size: 16px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: #0071e3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background: #0077ed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>M. Selby</h1>
        <p>Design & Project Portfolio</p>
        
        <a href="https://docs.google.com/viewer?url=https://mselby.github.io/portfolio.pdf&embedded=true" class="btn" target="_blank">View PDF Portfolio</a>
    </div>

</body>
</html>
