<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Selby | Portfolio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0e12;
            color: #f3f4f6;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: #161822;
            padding: 45px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            border: 1px solid #242838;
        }
        h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 14px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            display: block;
        }
        p {
            font-size: 16px;
            color: #9ca3af;
            line-height: 1.5;
            margin: 0 0 35px 0;
        }
        .btn {
            display: block;
            background: #ff7b00;
            color: #0d0e12;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #ff9124;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>M. Selby</h1>
        <span class="subtitle">Project Portfolio</span>
        <p>A collection of comprehensive design strategies, workflows, and case studies.</p>
        <a href="https://docs.google.com/viewer?url=https://mselby.github.io/portfolio.pdf&embedded=true" class="btn" target="_blank">View Portfolio</a>
    </div>

</body>
</html>
